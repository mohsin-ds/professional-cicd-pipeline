---
- name: Configure Web Server
  hosts: webservers
  become: true
  tasks:
    - name: 1. Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: 2. Create user
      user:
        name: labuser
        state: present

    - name: 3. Deploy configuration file (Custom Homepage)
      copy:
        dest: /var/www/html/index.html
        content: "<h1>Server successfully configured by Ansible!</h1>"

    - name: 4. Start Nginx service
      service:
        name: nginx
        state: started
        enabled: yes