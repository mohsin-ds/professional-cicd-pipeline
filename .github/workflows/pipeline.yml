name: DevOps Assembly Line

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:

  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run lint

  test:
    name: Unit Testing
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm test

  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          exit-code: '1'

  build:
    name: Build Application
    runs-on: ubuntu-latest

    needs:
      - lint
      - test
      - security-scan

    steps:
      - uses: actions/checkout@v4

      - run: npm run build