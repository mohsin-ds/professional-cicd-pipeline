name: DevOps Assembly Line

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run lint

  test:
    name: Unit Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm test

  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          exit-code: '1'

  build:
    name: Build Application
    needs: [lint, test, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm run build

  smoke-test:
    name: Production Smoke Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check App Health
        run: |
          echo "Checking application health..."
          # Simulation: exit 1 to trigger Figure 18/19 failure
          exit 0

  rollback:
    name: Automated Rollback
    needs: smoke-test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Rollback
        run: echo "Smoke test failed! Reverting deployment to previous version."

  release:
    name: Semantic Release
    needs: smoke-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}