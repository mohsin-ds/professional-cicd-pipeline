smoke-test:
    name: Production Smoke Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check App Health
        run: |
          echo "Checking application health..."
          # Simulation: exit 1 triggers failure (Fig 18)
          # Simulation: exit 0 triggers success (Fig 20)
          exit 1 

  rollback:
    name: Automated Rollback
    needs: smoke-test
    if: failure() # This job only runs if the smoke-test fails
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Rollback
        run: echo "Smoke test failed! Reverting deployment to previous version."